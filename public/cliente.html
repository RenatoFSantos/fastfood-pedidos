<!DOCTYPE html>
<html lang="pt-BR">
    <head>
        <meta charset="UTF-8">
        <meta name="viewport" content="width=device-width, initial-scale=1.0">
        <link rel="stylesheet" href="./style.css"/>
        <link rel="icon" type="image/png" href="./images/favicon_midilabs.png" />
        <title>Acompanhe Seu Pedido</title>
    </head>
    <body>
        <div class="dashcli">
            <div class="title_cli column-title">
                <img src="./images/logo_alhadasburguer.jpg" width="100" height="100"/>
                <span>Acompanhe Seu Pedido - Alhadas Burger</span>
            </div>   
            <div class="container_cli">
                <div class="column">
                    <h2>AGUARDANDO PREPARO</h2>
                    <ul id="list1"></ul>
                </div>
                <div class="column">
                    <h2>EM PREPARO</h2>
                    <ul id="list2"></ul>
                </div>
                <div class="column">
                    <h2>CONCLUÍDO</h2>
                    <ul id="list3"></ul>
                </div>
            </div>
        </div>

        <script>
            const statuses = ['AGUARDANDO PREPARO', 'EM PREPARO', 'CONCLUIDO'];
            let orders = [];

            const lists = [
                document.getElementById('list1'),
                document.getElementById('list2'),
                document.getElementById('list3')
            ];

            async function carregarPedidos() {
                try {
                    const response = await fetch('/api/pedidos');
                    orders = await response.json();
                    render();
                } catch (err) {
                    console.error('Erro ao carregar pedidos:', err);
                }
            }

            function render() {
                lists.forEach(list => list.innerHTML = '');

                orders.forEach(order => {
                    const index = statuses.indexOf(order.status);
                    if (index === -1) return;

                    const li = document.createElement('li');
                    li.textContent = `${order.id}`;
                    lists[index].appendChild(li);
                });
            }

            carregarPedidos();
            setInterval(carregarPedidos, 3000); // Atualiza a cada 3 segundos
        </script>
    </body>
</html>
